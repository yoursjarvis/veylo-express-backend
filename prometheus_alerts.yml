groups:
  - name: backend_alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Backend instance {{ $labels.instance }} has been offline for more than 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are resulting in 5xx errors."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_ms_bucket[5m]))) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 Latency"
          description: "P95 latency is above 1 second for the last 5 minutes."

      - alert: PostgresUnavailable
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres is down"
          description: "Postgres database is unreachable."

      - alert: RedisUnavailable
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache is unreachable."
